                            500: '#7F7367',  // Soft coffee gray
                            600: '#665A50',  // Warm earth gray
                            700: '#4A3F35',  // Warm border color (chocolate-gray)
                            800: '#28231E',  // Elevated card background (warm cocoa)
                            900: '#191512',  // Base page background (warm espresso)
                            950: '#0F0C0A'   // Deep sunken inputs background

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #191512; /* Fundo quente espresso */
            color: #FAF9F6;            /* Fonte quente creme */
            -webkit-font-smoothing: antialiased;
        }
        
        /* Interceptação de classes arbitrárias do Tailwind de fundo azul frio (#0F172A e #1E293B) */
        [class*="bg-[#0F172A]"], [class*="bg-[#0f172a]"] {
            background-color: rgba(25, 21, 18, var(--tw-bg-opacity, 1)) !important;
        }
        [class*="bg-[#1E293B]"], [class*="bg-[#1e293b]"] {
            background-color: rgba(40, 35, 30, var(--tw-bg-opacity, 1)) !important;
        }
        [class*="border-[#0F172A]"], [class*="border-[#1E293B]"] {
            border-color: rgba(74, 63, 53, var(--tw-border-opacity, 1)) !important;
        }
        
        /* Ajuste de foco nos campos para anel periwinkle quente */
        .focus\:ring-blue-500:focus {
            --tw-ring-color: #587AE6 !important;
        }
        .focus\:border-blue-500:focus {
            border-color: #587AE6 !important;
        }
        
        /* Correção para campos de escrita: texto sempre escuro em fundos claros */
        input, select, textarea {
            color: #28231E !important; /* Cor café escuro para contraste em campos claros */
        }
        
        /* Caso o campo tenha fundo escuro ou tema escuro */
        input.dark-field,
        input.text-white, textarea.text-white, select.text-white,
        input.text-slate-100, textarea.text-slate-100, select.text-slate-100,
        input.text-slate-200, textarea.text-slate-200, select.text-slate-200,
        input.text-slate-300, textarea.text-slate-300, select.text-slate-300,
        input.bg-slate-800, select.bg-slate-800, textarea.bg-slate-800,
        input.bg-slate-900, select.bg-slate-900, textarea.bg-slate-900,
        input.bg-slate-950, select.bg-slate-950, textarea.bg-slate-950,
        input.bg-slate-955, select.bg-slate-955, textarea.bg-slate-955,
        .bg-slate-800 input, .bg-slate-800 select, .bg-slate-800 textarea,
        .bg-slate-900 input, .bg-slate-900 select, .bg-slate-900 textarea,
        .bg-slate-950 input, .bg-slate-950 select, .bg-slate-950 textarea,
        .bg-slate-955 input, .bg-slate-955 select, .bg-slate-955 textarea {
            color: #ffffff !important;
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .dashboard-card {
            background-color: #28231E;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }
    </style>
