<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Líder App - Gestão Industrial 4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #0F172A; /* Fundo azul-escuro slate-900 original */
            color: #f8fafc;            /* Fonte clara original */
            -webkit-font-smoothing: antialiased;
        }
        
        /* Ajustar todos os blocos brancos/claros de menus para o modo escuro azulado coerente */
        .bg-white, 
        .bg-slate-50, 
        .bg-slate-100,
        [class*="bg-slate-50"], 
        [class*="bg-slate-100"] {
            background-color: #1E293B !important; /* Slate-800 card dark */
            color: #f8fafc !important;             /* Texto claro */
        }
        
        /* Ajustar bordas claras para bordas escuras nos menus */
        .border-slate-100, 
        .border-slate-200, 
        .border-slate-300,
        [class*="border-slate-100"], 
        [class*="border-slate-200"] {
            border-color: #334155 !important;     /* Slate-700 dark border */
        }

        /* Ajustar textos escuros (que ficariam invisíveis nos cards escuros) para textos claros */
        .text-slate-900, 
        .text-slate-800, 
        .text-slate-700, 
        .text-slate-600 {
            color: #cbd5e1 !important;             /* Slate-300 light gray text */
        }

        /* Forçar todos os campos de entrada, selects e textareas para o tema escuro azulado */
        input, select, textarea {
            background-color: #0F172A !important;  /* Slate-900 fundo escuro */
            border-color: #334155 !important;      /* Slate-700 borda escura */
            color: #ffffff !important;              /* Texto branco */
        }

        /* Placeholder dos inputs */
        input::placeholder, textarea::placeholder {
            color: #64748b !important;             /* Slate-500 */
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .dashboard-card {
            background-color: #1E293B; /* Slate-800 original */
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }
    </style>
<script type="importmap">
{
  "imports": {

    "date-fns": "https://esm.sh/date-fns@^4.1.0",
    "date-fns/": "https://esm.sh/date-fns@^4.1.0/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3"
  }
}
</script>
