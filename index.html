<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Líder App - Gestão Industrial 4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #0F172A; /* Fundo azul-escuro slate-900 original */
            color: #f8fafc;            /* Fonte clara original */
            -webkit-font-smoothing: antialiased;
        }
        
        /* Ajustar todos os blocos principais para fundo branco limpo com texto escuro em todos os menus */
        .bg-white, 
        .bg-slate-50, 
        .bg-slate-100,
        .bg-slate-800,
        .bg-slate-900,
        [class*="bg-slate-50"], 
        [class*="bg-slate-100"],
        [class*="bg-slate-800"],
        [class*="bg-slate-900"] {
            background-color: #FFFFFF !important; /* Branco limpo para os blocos */
            color: #1E293B !important;             /* Texto escuro slate-800 */
        }
        
        /* Ajustar contêineres aninhados escuros para tons de cinza claro/rebaixado */
        .bg-slate-800 .bg-slate-900,
        .bg-slate-800 .bg-slate-950,
        .bg-slate-800 .bg-slate-955,
        .bg-slate-900 .bg-slate-950,
        .bg-slate-900 .bg-slate-955,
        .bg-white .bg-slate-900,
        .bg-white .bg-slate-900\/50,
        .bg-white .bg-slate-950,
        .bg-white .bg-slate-955,
        [class*="bg-slate-800"] [class*="bg-slate-900"],
        [class*="bg-slate-800"] [class*="bg-slate-955"],
        [class*="bg-slate-800"] [class*="bg-slate-950"],
        [class*="bg-slate-900"] [class*="bg-slate-900"],
        [class*="bg-slate-900"] [class*="bg-slate-955"],
        [class*="bg-slate-900"] [class*="bg-slate-950"] {
            background-color: #F3F4F6 !important; /* Gray-100 rebaixado */
            color: #1E293B !important;
        }

        /* Ajustar bordas de blocos e cards para contraste elegante */
        .border-slate-100, 
        .border-slate-200, 
        .border-slate-300,
        .border-slate-800,
        [class*="border-slate-100"], 
        [class*="border-slate-200"],
        [class*="border-slate-800"] {
            border-color: #E5E7EB !important;     /* Gray-200 borda suave */
        }

        /* Ajustar botões secundários nos blocos */
        .bg-slate-50 .bg-slate-900,
        .bg-white .bg-slate-900,
        .bg-slate-800 .bg-slate-900,
        .bg-slate-900 .bg-slate-900 {
            color: #ffffff !important;
        }

        /* Campos de texto padrão (fundo cinza-claro muito suave, texto escuro) */
        input, select, textarea {
            background-color: #F9FAFB !important; /* Fundo cinza-claro gray-50 */
            border-color: #D1D5DB !important;     /* Borda gray-300 */
            color: #1E293B !important;             /* Texto slate-800 */
        }

        /* Campos de texto quando focados */
        input:focus, select:focus, textarea:focus {
            background-color: #FFFFFF !important; /* Fica branco puro no foco */
            border-color: #3B82F6 !important;     /* Borda azul no foco */
            outline: none !important;
        }

        /* Campos de texto que devem permanecer escuros (como com classe dark-field) */
        input.dark-field,
        input.text-white, textarea.text-white, select.text-white,
        input.text-slate-100, textarea.text-slate-100, select.text-slate-100,
        input.text-slate-200, textarea.text-slate-200, select.text-slate-200,
        input.text-slate-300, textarea.text-slate-300, select.text-slate-300 {
            background-color: #0F172A !important; /* Fundo dark original */
            border-color: #334155 !important;     /* Borda dark original */
            color: #FFFFFF !important;             /* Texto branco */
        }

        /* Placeholder dos inputs */
        input::placeholder, textarea::placeholder {
            color: #9CA3AF !important;             /* Gray-400 */
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .dashboard-card {
            background-color: #1E293B; /* Slate-800 original */
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }
    </style>
<script type="importmap">
{
  "imports": {

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "date-fns": "https://esm.sh/date-fns@^4.1.0",
    "date-fns/": "https://esm.sh/date-fns@^4.1.0/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3"
  }
}
</script>

</head>

</html>
